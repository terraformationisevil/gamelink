<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VR Cube Grab &amp; Teleport</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #111; }
  #info {
    position: absolute; top: 12px; left: 0; width: 100%;
    text-align: center; color: #fff; font-family: sans-serif;
    font-size: 15px; z-index: 1; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div id="info">Grip button = grab the cube &nbsp;|&nbsp; Trigger = aim &amp; teleport</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ---------- Basic scene setup ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 10, 40);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Lighting ----------
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(3, 8, 4);
scene.add(dirLight);

// ---------- Player rig (moving this moves the player in VR) ----------
const rig = new THREE.Group();
rig.position.set(0, 0, 3);
rig.add(camera);
scene.add(rig);

// ---------- Massive green platform ----------
const PLATFORM_SIZE = 40;
const platform = new THREE.Mesh(
  new THREE.BoxGeometry(PLATFORM_SIZE, 0.2, PLATFORM_SIZE),
  new THREE.MeshStandardMaterial({ color: 0x2ecc40, roughness: 0.9 })
);
platform.position.y = -0.1;
scene.add(platform);

// simple grid lines on the platform for visual scale
const grid = new THREE.GridHelper(PLATFORM_SIZE, 40, 0x1c7a2c, 0x1c7a2c);
grid.position.y = 0.001;
scene.add(grid);

// ---------- Grabbable / falling cube ----------
const CUBE_SIZE = 0.2;
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE),
  new THREE.MeshStandardMaterial({ color: 0xff8c00, roughness: 0.4, metalness: 0.1 })
);
cube.position.set(0, 1.5, 2);
scene.add(cube);

let cubeVelocityY = 0;
let grabbingController = null; // reference to the controller currently holding the cube

// ---------- Controllers ----------
const controllerModelFactory = new XRControllerModelFactory();
const tempMatrix = new THREE.Matrix4();
const raycaster = new THREE.Raycaster();

const controllers = [];

for (let i = 0; i < 2; i++) {
  const controller = renderer.xr.getController(i);
  controller.userData.isSelecting = false;
  controller.userData.isSqueezing = false;
  rig.add(controller);
  controllers.push(controller);

  // visible controller model
  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerModelFactory.createControllerModel(grip));
  rig.add(grip);

  // small laser pointer, always visible on the controller
  const pointerGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -1)
  ]);
  const pointer = new THREE.Line(pointerGeom, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 }));
  pointer.scale.z = 0.3;
  controller.add(pointer);

  controller.addEventListener('selectstart', () => { controller.userData.isSelecting = true; });
  controller.addEventListener('selectend', () => {
    controller.userData.isSelecting = false;
    if (controller.userData.teleportValid) {
      rig.position.x = controller.userData.teleportPoint.x;
      rig.position.z = controller.userData.teleportPoint.z;
    }
    teleportMarker.visible = false;
    teleportLine.visible = false;
  });

  controller.addEventListener('squeezestart', () => {
    controller.userData.isSqueezing = true;
    // only grab if no one else already holding the cube
    if (grabbingController === null) {
      const controllerWorldPos = new THREE.Vector3();
      controller.getWorldPosition(controllerWorldPos);
      const dist = controllerWorldPos.distanceTo(cube.position);
      if (dist < 0.4) {
        grabbingController = controller;
        controller.attach(cube); // reparent, preserving world transform
        cubeVelocityY = 0;
      }
    }
  });

  controller.addEventListener('squeezeend', () => {
    controller.userData.isSqueezing = false;
    if (grabbingController === controller) {
      scene.attach(cube); // reparent back to world, preserving world transform
      grabbingController = null;
      cubeVelocityY = 0; // starts falling fresh from release point
    }
  });
}

// ---------- Teleport marker + aim line ----------
const teleportMarker = new THREE.Mesh(
  new THREE.RingGeometry(0.25, 0.35, 32).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
);
teleportMarker.visible = false;
scene.add(teleportMarker);

const teleportLineGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
const teleportLine = new THREE.Line(teleportLineGeom, new THREE.LineBasicMaterial({ color: 0x00e5ff }));
teleportLine.visible = false;
scene.add(teleportLine);

function updateTeleportAim(controller) {
  tempMatrix.identity().extractRotation(controller.matrixWorld);

  const origin = new THREE.Vector3();
  controller.getWorldPosition(origin);

  const direction = new THREE.Vector3(0, 0, -1).applyMatrix4(tempMatrix).normalize();

  raycaster.ray.origin.copy(origin);
  raycaster.ray.direction.copy(direction);

  const hits = raycaster.intersectObject(platform, false);

  if (hits.length > 0) {
    const point = hits[0].point;
    controller.userData.teleportValid = true;
    controller.userData.teleportPoint = point;

    teleportMarker.position.set(point.x, 0.01, point.z);
    teleportMarker.visible = true;

    const positions = teleportLine.geometry.attributes.position;
    positions.setXYZ(0, origin.x, origin.y, origin.z);
    positions.setXYZ(1, point.x, point.y + 0.02, point.z);
    positions.needsUpdate = true;
    teleportLine.visible = true;
  } else {
    controller.userData.teleportValid = false;
    teleportMarker.visible = false;
    teleportLine.visible = false;
  }
}

// ---------- Render / physics loop ----------
const GRAVITY = 9.8;
const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const delta = Math.min(clock.getDelta(), 0.05);

  // teleport aiming, only for whichever controller currently has trigger held
  let aiming = false;
  for (const controller of controllers) {
    if (controller.userData.isSelecting) {
      updateTeleportAim(controller);
      aiming = true;
    }
  }
  if (!aiming) {
    teleportMarker.visible = false;
    teleportLine.visible = false;
  }

  // cube physics — only falls when not currently grabbed
  if (grabbingController === null) {
    cubeVelocityY -= GRAVITY * delta;
    cube.position.y += cubeVelocityY * delta;

    const floorY = CUBE_SIZE / 2;
    if (cube.position.y < floorY) {
      cube.position.y = floorY;
      cubeVelocityY = 0;
    }

    // keep the cube on the platform bounds
    const half = PLATFORM_SIZE / 2 - CUBE_SIZE / 2;
    cube.position.x = THREE.MathUtils.clamp(cube.position.x, -half, half);
    cube.position.z = THREE.MathUtils.clamp(cube.position.z, -half, half);
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
