<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm Automation Tycoon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: #2d5016; 
      color: #fff;
      overflow: hidden;
    }
    #game-container { 
      display: flex; 
      height: 100vh;
    }
    #left-panel {
      width: 250px;
      background: #1a3010;
      padding: 15px;
      overflow-y: auto;
    }
    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #top-bar {
      background: #1a3010;
      padding: 15px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #tabs {
      display: flex;
      gap: 10px;
      background: #1a3010;
      padding: 10px;
    }
    .tab {
      padding: 10px 20px;
      background: #2d5016;
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
    }
    .tab.active {
      background: #4a7c2e;
    }
    #content-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .farm-grid {
      display: inline-block;
      position: relative;
    }
    .plant-plot {
      display: inline-block;
      width: 80px;
      height: 80px;
      background: #3d2817;
      border: 2px solid #5a3d24;
      margin: 5px;
      position: relative;
      cursor: pointer;
      border-radius: 5px;
      vertical-align: top;
    }
    .plant-plot:hover {
      border-color: #8b6239;
    }
    .plant-plot.machine {
      background: #2a2a2a;
      border-color: #555;
    }
    .plant-growing {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
    }
    .machine-emoji {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
    }
    .machine-id {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      background: rgba(0,0,0,0.7);
      padding: 2px 4px;
      border-radius: 3px;
    }
    .plant-progress {
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .plant-progress-bar {
      height: 100%;
      background: #4a7c2e;
      transition: width 0.3s;
    }
    .employee-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #ffcc00;
      border-radius: 50%;
      border: 2px solid #ff9900;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s;
      z-index: 10;
      pointer-events: none;
    }
    .inventory-item {
      background: #3d2817;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
    }
    .inventory-item:active {
      cursor: grabbing;
    }
    .market-item {
      background: #3d2817;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      background: #4a7c2e;
      border: none;
      color: #fff;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn:hover {
      background: #5a8c3e;
    }
    .btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .btn-small {
      padding: 4px 8px;
      font-size: 12px;
    }
    .machine-card {
      background: #3d2817;
      padding: 15px;
      margin: 10px;
      border-radius: 5px;
      display: inline-block;
      vertical-align: top;
      width: 200px;
    }
    .machine-card h3 {
      margin-bottom: 10px;
    }
    .machine-grid {
      display: flex;
      flex-wrap: wrap;
    }
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    #modal.active {
      display: flex;
    }
    .modal-content {
      background: #2d5016;
      padding: 30px;
      border-radius: 10px;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-with-inventory {
      display: flex;
      gap: 20px;
    }
    .modal-main {
      flex: 1;
    }
    .modal-inventory {
      width: 200px;
      background: #1a3010;
      padding: 10px;
      border-radius: 5px;
      max-height: 400px;
      overflow-y: auto;
    }
    .modal-inventory h3 {
      margin-bottom: 10px;
      font-size: 14px;
    }
    .modal-inv-item {
      background: #3d2817;
      padding: 8px;
      margin: 5px 0;
      border-radius: 3px;
      font-size: 12px;
      cursor: grab;
    }
    .modal-inv-item:active {
      cursor: grabbing;
    }
    .close-modal {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
      color: #fff;
    }
    .slot {
      width: 60px;
      height: 60px;
      background: #1a3010;
      border: 2px dashed #4a7c2e;
      display: inline-block;
      margin: 5px;
      position: relative;
      border-radius: 5px;
    }
    .slot.filled {
      border-style: solid;
    }
    .slot-item {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
    }
    .slot-count {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 12px;
      background: rgba(0,0,0,0.7);
      padding: 2px 4px;
      border-radius: 3px;
    }
    .machine-slots {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .progress-bar {
      width: 100%;
      height: 20px;
      background: #1a3010;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      background: #4a7c2e;
      transition: width 0.3s;
    }
    .employee-card {
      background: #3d2817;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .upgrade-card {
      background: #3d2817;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    select {
      padding: 5px;
      background: #1a3010;
      color: #fff;
      border: 1px solid #4a7c2e;
      border-radius: 3px;
      margin: 5px 0;
      width: 100%;
    }
    input[type="number"] {
      padding: 5px;
      background: #1a3010;
      color: #fff;
      border: 1px solid #4a7c2e;
      border-radius: 3px;
      margin: 5px 0;
      width: 100%;
    }
    .placing-machine {
      border: 3px solid #ffcc00 !important;
      animation: pulse 0.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .job-config {
      background: #2d5016;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .codex-section {
      margin: 20px 0;
    }
    .codex-item {
      background: #3d2817;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #4a7c2e;
    }
    .codex-item.locked {
      opacity: 0.5;
      border-left-color: #666;
    }
    .codex-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .codex-emoji {
      font-size: 32px;
    }
    .codex-title {
      font-size: 18px;
      font-weight: bold;
    }
    .codex-description {
      margin: 10px 0;
      color: #ddd;
    }
    .codex-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 14px;
    }
    .codex-stat {
      background: #2d5016;
      padding: 5px 10px;
      border-radius: 3px;
    }
    .recipe-output-item {
      margin: 5px 0;
      padding: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }
  </style>
</head>

      <div id="tabs">
        <button class="tab active" onclick="switchTab('farm')">Farm</button>

        <button class="tab" onclick="switchTab('machines')">Machines</button>
        <button class="tab" onclick="switchTab('employees')">Employees</button>
        <button class="tab" onclick="switchTab('upgrades')">Upgrades</button>
        <button class="tab" onclick="switchTab('codex')">Codex</button>
      </div>
      <div id="content-area">

        <div id="market-tab" class="tab-content" style="display:none;"></div>

        <div id="employees-tab" class="tab-content" style="display:none;"></div>
        <div id="upgrades-tab" class="tab-content" style="display:none;"></div>
        <div id="codex-tab" class="tab-content" style="display:none;"></div>
      </div>
    </div>
  </div>

  <div id="modal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeModal()">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

    // ===== HELPER FUNCTIONS =====
    function addToInventory(type, count = 1) {
      gameState.inventory[type] = (gameState.inventory[type] || 0) + count;
      
      // Discover items for codex
      if (CONFIG.items[type]) {
        gameState.codex.itemsDiscovered.add(type);
      } else if (CONFIG.plants[type]) {
        gameState.codex.plantsDiscovered.add(type);
      }
      
      updateInventory();
    }

    function removeFromInventory(type, count = 1) {
      if ((gameState.inventory[type] || 0) >= count) {
        gameState.inventory[type] -= count;
        if (gameState.inventory[type] <= 0) delete gameState.inventory[type];
        updateInventory();
        return true;
      }
      return false;
    }

    function getItemInfo(type) {
      if (type.endsWith('_seed')) {
        const plantType = type.replace('_seed', '');
        const plant = CONFIG.plants[plantType];
        if (plant) {
          return { name: plant.name + ' Seed', emoji: '🌱', basePrice: plant.seedPrice };
        }
      }
      return CONFIG.plants[type] || CONFIG.items[type] || { name: type, emoji: '❓', basePrice: 0 };
    }

    function getDisplayName(type) {
      // Check if item/plant is discovered
      if (type.endsWith('_seed')) {
        const plantType = type.replace('_seed', '');
        if (!gameState.codex.plantsDiscovered.has(plantType)) {
          return '[Locked]';
        }
      } else if (CONFIG.plants[type]) {
        if (!gameState.codex.plantsDiscovered.has(type)) {
          return '[Locked]';
        }
      } else if (CONFIG.items[type]) {
        if (!gameState.codex.itemsDiscovered.has(type)) {
          return '[Locked]';
        }
      }
      
      const info = getItemInfo(type);
      return info.name;
    }

    function updateInventory() {
      const inv = document.getElementById('inventory');
      inv.innerHTML = '';
      Object.entries(gameState.inventory).forEach(([type, count]) => {
        const info = getItemInfo(type);
        const displayName = getDisplayName(type);
        const div = document.createElement('div');
        div.className = 'inventory-item';
        div.draggable = true;
        div.innerHTML = `<span>${info.emoji} ${displayName}</span><span>${count}</span>`;
        div.addEventListener('dragstart', (e) => {
          gameState.draggedItem = { type, from: 'inventory' };
        });
        inv.appendChild(div);
      });
    }

    function updateMoney() {
      document.getElementById('money').textContent = Math.floor(gameState.money);
    }

    function getMachineById(id) {
      return gameState.machines.find(m => m.id === parseInt(id));
    }

    function getItemsFromCrate(crateId) {
      const crate = getMachineById(crateId);
      if (!crate) return {};
      const items = {};
      crate.outputSlots.forEach(slot => {
        if (slot) {
          items[slot.type] = (items[slot.type] || 0) + slot.count;
        }
      });
      return items;
    }

    function removeItemFromCrate(crateId, itemType, count) {
      const crate = getMachineById(crateId);
      if (!crate) return false;
      
      let remaining = count;
      for (let i = 0; i < crate.outputSlots.length; i++) {
        const slot = crate.outputSlots[i];
        if (slot && slot.type === itemType) {
          const takeAmount = Math.min(slot.count, remaining);
          slot.count -= takeAmount;
          remaining -= takeAmount;
          if (slot.count <= 0) {
            crate.outputSlots[i] = null;
          }
          if (remaining <= 0) return true;
        }
      }
      return remaining === 0;
    }

    function addItemToCrate(crateId, itemType, count) {
      const crate = getMachineById(crateId);
      if (!crate) return false;
      
      // Try to stack first in output slots
      for (let i = 0; i < crate.outputSlots.length; i++) {
        const slot = crate.outputSlots[i];
        if (slot && slot.type === itemType) {
          slot.count += count;
          return true;
        }
      }
      
      // Find empty slot in output slots
      for (let i = 0; i < crate.outputSlots.length; i++) {
        if (!crate.outputSlots[i]) {
          crate.outputSlots[i] = { type: itemType, count };
          return true;
        }
      }
      
      return false;
    }

    // Process recipe outputs with chance system
    function processRecipeOutputs(recipe, outputSlots) {
      recipe.output.forEach(out => {
        // Check if this output has a chance property
        const shouldProduce = !out.chance || (Math.random() * 100 < out.chance);
        
        if (shouldProduce) {
          let added = false;
          // Try to stack with existing items
          for (let i = 0; i < outputSlots.length; i++) {
            if (outputSlots[i] && outputSlots[i].type === out.type) {
              outputSlots[i].count += out.count;
              added = true;
              break;
            }
          }
          
          // Find empty slot if not stacked
          if (!added) {
            const emptySlot = outputSlots.findIndex(s => !s);
            if (emptySlot >= 0) {
              outputSlots[emptySlot] = { type: out.type, count: out.count };
            }
          }
        }
      });
    }

    function renderEmployees() {
      const grid = document.getElementById('farm-grid-container');
      if (!grid) return;
      
      // Remove old markers
      document.querySelectorAll('.employee-marker').forEach(el => el.remove());
      
      gameState.employees.forEach((emp, idx) => {
        const marker = document.createElement('div');
        marker.className = 'employee-marker';
        marker.textContent = (idx + 1);
        marker.title = emp.name;
        
        // Position based on current location
        const pos = getEmployeePosition(emp);
        marker.style.left = pos.x + 'px';
        marker.style.top = pos.y + 'px';
        
        grid.appendChild(marker);
      });
    }

    function getEmployeePosition(emp) {
      if (!emp.currentPlot && emp.currentPlot !== 0) {
        return { x: 0, y: 0 };
      }
      
      const plotEl = document.querySelector(`[data-plot-index="${emp.currentPlot}"]`);
      if (plotEl) {
        const rect = plotEl.getBoundingClientRect();
        const gridRect = document.getElementById('farm-grid-container').getBoundingClientRect();
        return {
          x: rect.left - gridRect.left + 30,
          y: rect.top - gridRect.top + 30
        };
      }
      return { x: 0, y: 0 };
    }

    function showPlantSelector(plotIdx) {
      const modalBody = document.getElementById('modal-body');
      modalBody.innerHTML = '<h2>Select Plant to Grow</h2><p>Requires seeds!</p>';
      
      Object.entries(CONFIG.plants).forEach(([key, plant]) => {
        const seedType = key + '_seed';
        const hasSeeds = (gameState.inventory[seedType] || 0) > 0;
        const displayName = getDisplayName(key);
        
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.style.display = 'block';
        btn.style.margin = '10px 0';
        btn.style.width = '100%';
        btn.textContent = `${plant.emoji} ${displayName} (${plant.growTime}s) - ${hasSeeds ? '✓ Has Seeds' : '✗ No Seeds'}`;
        btn.disabled = !hasSeeds;
        btn.onclick = () => {
          if (removeFromInventory(seedType, 1)) {
            gameState.plots[plotIdx] = { type: 'plot', plant: key, progress: 0, machine: null };
            closeModal();
            initFarm();
          }
        };
        modalBody.appendChild(btn);
      });
      
      document.getElementById('modal').classList.add('active');
    }

    function harvestPlot(idx) {
      const plot = gameState.plots[idx];
      if (plot.plant && plot.progress >= 100) {
        const plantConfig = CONFIG.plants[plot.plant];
        
        // Discover the plant for codex
        gameState.codex.plantsDiscovered.add(plot.plant);
        
        if (plantConfig.isTree && plantConfig.yields) {
          plantConfig.yields.forEach(item => {
            addToInventory(item, 1);
          });
        } else {
          addToInventory(plot.plant, 1);
        }
        
        gameState.plots[idx] = { type: 'plot', plant: null, progress: 0, machine: null };
        initFarm();
      }
    }

    function placeMachineOnPlot(plotIdx) {
      const plot = gameState.plots[plotIdx];
      if (plot.plant || plot.machine) return;
      
      const machineData = gameState.placingMachine;
      plot.machine = machineData.type;
      
      // Discover machine for codex
      gameState.codex.machinesDiscovered.add(machineData.type);
      
      const newMachine = {
        id: gameState.machines.length + 1,
        type: machineData.type,
        config: machineData.config,
        plotIndex: plotIdx,
        inputSlots: Array(machineData.config.inputSlots).fill(null),
        outputSlots: Array(machineData.config.outputSlots).fill(null),
        progress: 0,
        clicks: 0,
        processing: false
      };
      
      gameState.machines.push(newMachine);
      
      gameState.placingMachine = null;
      initFarm();
      initMachines();
    }

      // Input slots
      if (machine.config.inputSlots > 0) {
        const inputDiv = document.createElement('div');
        inputDiv.innerHTML = '<h3>Input</h3>';
        const slotsDiv = document.createElement('div');

          const slotDiv = document.createElement('div');

          slotDiv.addEventListener('dragover', (e) => e.preventDefault());
          slotDiv.addEventListener('drop', (e) => {
            e.preventDefault();
            if (gameState.draggedItem && (gameState.draggedItem.from === 'inventory' || gameState.draggedItem.from === 'modal-inventory')) {
              const type = gameState.draggedItem.type;
              if (slot && slot.type === type) {
                if (removeFromInventory(type, 1)) {
                  machine.inputSlots[slotIdx].count += 1;
                  renderMachineUI(idx);
                  renderModalInventory(idx);
                }
              } else if (!slot) {
                if (removeFromInventory(type, 1)) {
                  machine.inputSlots[slotIdx] = { type, count: 1 };
                  renderMachineUI(idx);
                  renderModalInventory(idx);
                }
              }
            }
          });
          
          if (slot) {
            const info = getItemInfo(slot.type);
            slotDiv.innerHTML = `<div class="slot-item">${info.emoji}</div><div class="slot-count">${slot.count}</div>`;
            slotDiv.onclick = () => {
              addToInventory(slot.type, slot.count);
              machine.inputSlots[slotIdx] = null;
              renderMachineUI(idx);
              renderModalInventory(idx);
            };
          }
          
          slotsDiv.appendChild(slotDiv);
        });
        inputDiv.appendChild(slotsDiv);
        container.appendChild(inputDiv);
      }
      
      // Process button/progress
      const recipe = findMatchingRecipe(machine);
      if (recipe) {
        if (recipe.clicks) {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.textContent = `Process (${machine.clicks}/${recipe.clicks})`;
          btn.onclick = () => {
            machine.clicks++;
            if (machine.clicks >= recipe.clicks) {
              processRecipe(machine, recipe);
              machine.clicks = 0;
            }
            renderMachineUI(idx);
          };
          container.appendChild(btn);
        } else if (recipe.time && !machine.processing) {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.textContent = 'Start Processing';
          btn.onclick = () => {
            machine.processing = true;
            machine.progress = 0;
            renderMachineUI(idx);
          };
          container.appendChild(btn);
        }
      }
      
      if (machine.processing && recipe && recipe.time) {
        const progressDiv = document.createElement('div');
        progressDiv.className = 'progress-bar';
        progressDiv.innerHTML = `<div class="progress-fill" style="width: ${machine.progress}%"></div>`;
        container.appendChild(progressDiv);
      }
      
      // Output slots
      if (machine.config.outputSlots > 0) {
        const outputDiv = document.createElement('div');
        outputDiv.innerHTML = '<h3>Output</h3>';
        const slotsDiv = document.createElement('div');
        slotsDiv.className = 'machine-slots';
        
        machine.outputSlots.forEach((slot, slotIdx) => {
          const slotDiv = document.createElement('div');
          slotDiv.className = slot ? 'slot filled' : 'slot';
          
          if (slot) {
            const info = getItemInfo(slot.type);
            slotDiv.innerHTML = `<div class="slot-item">${info.emoji}</div><div class="slot-count">${slot.count}</div>`;
            slotDiv.onclick = () => {
              addToInventory(slot.type, slot.count);
              machine.outputSlots[slotIdx] = null;
              renderMachineUI(idx);
              renderModalInventory(idx);
            };
          }
          
          slotsDiv.appendChild(slotDiv);
        });
        outputDiv.appendChild(slotsDiv);
        container.appendChild(outputDiv);
      }
    }

    function findMatchingRecipe(machine) {
      for (const recipe of machine.config.recipes) {
        if (recipe.input.length === 0) {
          return recipe;
        }
        
        let matches = true;
        for (const req of recipe.input) {
          const slot = machine.inputSlots.find(s => s && s.type === req.type && s.count >= req.count);
          if (!slot) {
            matches = false;
            break;
          }
        }
        if (matches) return recipe;
      }
      return null;
    }

    function processRecipe(machine, recipe) {
      // Discover recipe for codex
      const recipeKey = `${machine.type}_${recipe.output[0].type}`;
      gameState.codex.recipesDiscovered.add(recipeKey);
      
      recipe.input.forEach(req => {
        const slotIdx = machine.inputSlots.findIndex(s => s && s.type === req.type && s.count >= req.count);
        if (slotIdx >= 0) {
          machine.inputSlots[slotIdx].count -= req.count;
          if (machine.inputSlots[slotIdx].count <= 0) {
            machine.inputSlots[slotIdx] = null;
          }
        }
      });
      
      // Process outputs with chance system
      processRecipeOutputs(recipe, machine.outputSlots);
      
      machine.processing = false;
      machine.progress = 0;
    }

    // ===== TAB SWITCHING =====
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      
      event.target.classList.add('active');
      document.getElementById(`${tab}-tab`).style.display = 'block';
      
      if (tab === 'farm') initFarm();
      else if (tab === 'market') initMarket();
      else if (tab === 'machines') initMachines();
      else if (tab === 'employees') initEmployees();
      else if (tab === 'upgrades') initUpgrades();
      else if (tab === 'codex') initCodex();
    }

    // ===== GAME LOOP =====
    function gameLoop() {
      gameState.time += 0.1;
      document.getElementById('game-time').textContent = Math.floor(gameState.time);
      
      // Grow plants
      gameState.plots.forEach(plot => {
        if (plot.plant && plot.progress < 100) {
          const growTime = CONFIG.plants[plot.plant].growTime;
          plot.progress += (100 / growTime) * 0.1;
          if (plot.progress > 100) plot.progress = 100;
        }
      });
      
      // Process machines
      gameState.machines.forEach(machine => {
        // Instant transfer for crates
        if (machine.config.instantTransfer) {
          machine.inputSlots.forEach((slot, idx) => {
            if (slot && slot.count > 0) {
              // Try to add to output slots
              let added = false;
              
              // Try stacking first
              for (let i = 0; i < machine.outputSlots.length; i++) {
                if (machine.outputSlots[i] && machine.outputSlots[i].type === slot.type) {
                  machine.outputSlots[i].count += slot.count;
                  machine.inputSlots[idx] = null;
                  added = true;
                  break;
                }
              }
              
              // Find empty slot
              if (!added) {
                for (let i = 0; i < machine.outputSlots.length; i++) {
                  if (!machine.outputSlots[i]) {
                    machine.outputSlots[i] = { type: slot.type, count: slot.count };
                    machine.inputSlots[idx] = null;
                    break;
                  }
                }
              }
            }
          });
        }
        
        // Auto-sell in market stalls
        if (machine.config.isMarket) {
          machine.inputSlots.forEach((slot, idx) => {
            if (slot && slot.count > 0) {
              const info = getItemInfo(slot.type);
              gameState.money += info.basePrice;
              slot.count--;
              if (slot.count <= 0) {
                machine.inputSlots[idx] = null;
              }
              updateMoney();
            }
          });
        }
        
        if (machine.config.autoProcess && !machine.processing) {
          const recipe = findMatchingRecipe(machine);
          if (recipe && recipe.time) {
            machine.processing = true;
            machine.progress = 0;
          }
        }
        
        if (machine.processing) {
          const recipe = findMatchingRecipe(machine);
          if (recipe && recipe.time) {
            machine.progress += (100 / recipe.time) * 0.1;
            if (machine.progress >= 100) {
              processRecipe(machine, recipe);
            }
          }
        }
      });
      
      // Employee AI
      const speedMultiplier = 1 + (gameState.upgrades.employeeSpeed * 0.2);
      gameState.employees.forEach(employee => {
        if (employee.job) {
          employee.progress += 0.5 * speedMultiplier;
          
          if (employee.progress >= 100) {
            const job = employee.job;
            let actionPerformed = false;
            
            if (job.type === 'harvest') {
              let plot = gameState.plots.find(p => {
                if (!p.plant || p.progress < 100) return false;
                if (job.plantFilter && p.plant !== job.plantFilter) return false;
                return true;
              });
              
              if (plot) {
                employee.currentPlot = gameState.plots.indexOf(plot);
                const plantConfig = CONFIG.plants[plot.plant];
                
                // Discover the plant for codex
                gameState.codex.plantsDiscovered.add(plot.plant);
                
                const items = [];
                if (plantConfig.isTree && plantConfig.yields) {
                  items.push(...plantConfig.yields);
                } else {
                  items.push(plot.plant);
                }
                
                items.forEach(item => {
                  addItemToCrate(job.crateId, item, 1);
                });
                
                plot.plant = null;
                plot.progress = 0;
                actionPerformed = true;
              }
            } else if (job.type === 'plant') {
              const emptyPlot = gameState.plots.find(p => !p.plant && !p.machine);
              if (emptyPlot) {
                employee.currentPlot = gameState.plots.indexOf(emptyPlot);
                const crateItems = getItemsFromCrate(job.crateId);
                
                for (const [itemType, count] of Object.entries(crateItems)) {
                  if (itemType.endsWith('_seed') && count > 0) {
                    const plantType = itemType.replace('_seed', '');
                    if (CONFIG.plants[plantType]) {
                      if (removeItemFromCrate(job.crateId, itemType, 1)) {
                        emptyPlot.plant = plantType;
                        emptyPlot.progress = 0;
                        actionPerformed = true;
                        break;
                      }
                    }
                  }
                }
              }
            } else if (job.type === 'move') {
              const fromMachine = getMachineById(job.fromMachine);
              const toMachine = getMachineById(job.toMachine);
              
              if (fromMachine && toMachine) {
                employee.currentPlot = fromMachine.plotIndex;
                
                // Try to move from output of fromMachine to input of toMachine
                for (let i = 0; i < fromMachine.outputSlots.length; i++) {
                  const slot = fromMachine.outputSlots[i];
                  if (slot && slot.count > 0) {
                    // Check item filter
                    if (job.itemFilter && slot.type !== job.itemFilter) continue;
                    
                    // Try to add to toMachine
                    let added = false;
                    
                    // Try stacking first
                    for (let j = 0; j < toMachine.inputSlots.length; j++) {
                      if (toMachine.inputSlots[j] && toMachine.inputSlots[j].type === slot.type) {
                        toMachine.inputSlots[j].count += 1;
                        slot.count--;
                        if (slot.count <= 0) {
                          fromMachine.outputSlots[i] = null;
                        }
                        added = true;
                        break;
                      }
                    }
                    
                    // Find empty slot
                    if (!added) {
                      for (let j = 0; j < toMachine.inputSlots.length; j++) {
                        if (!toMachine.inputSlots[j]) {
                          toMachine.inputSlots[j] = { type: slot.type, count: 1 };
                          slot.count--;
                          if (slot.count <= 0) {
                            fromMachine.outputSlots[i] = null;
                          }
                          added = true;
                          break;
                        }
                      }
                    }
                    
                    if (added) {
                      actionPerformed = true;
                      break;
                    }
                  }
                }
              }
            } else if (job.type === 'process') {
              const machine = getMachineById(job.machineId);
              if (machine) {
                employee.currentPlot = machine.plotIndex;
                const recipe = findMatchingRecipe(machine);
                
                if (recipe) {
                  if (recipe.clicks && !machine.processing) {
                    machine.clicks++;
                    if (machine.clicks >= recipe.clicks) {
                      processRecipe(machine, recipe);
                      machine.clicks = 0;
                      actionPerformed = true;
                    }
                  } else if (recipe.time && !machine.processing) {
                    machine.processing = true;
                    machine.progress = 0;
                    actionPerformed = true;
                  }
                }
              }
            } else if (job.type === 'buy_market') {
              const crate = getMachineById(job.crateId);
              if (crate) {
                employee.currentPlot = crate.plotIndex;
                const crateItems = getItemsFromCrate(job.crateId);
                const currentAmount = crateItems[job.itemType] || 0;
                
                if (currentAmount < job.targetAmount) {
                  const info = getItemInfo(job.itemType);
                  const price = info.basePrice;
                  
                  if (gameState.money >= price) {
                    gameState.money -= price;
                    addItemToCrate(job.crateId, job.itemType, 1);
                    updateMoney();
                    actionPerformed = true;
                  }
                }
              }
            }
            
            employee.progress = 0;
            
            // Update the farm tab if action was performed and we're on the farm tab
            if (actionPerformed) {
              const activeTab = document.querySelector('.tab.active');
              if (activeTab && activeTab.textContent.toLowerCase() === 'farm') {
                initFarm();
              }
            }
          }
        }
      });
      
      // Refresh current tab
      const activeTab = document.querySelector('.tab.active');
      if (activeTab) {
        const tabName = activeTab.textContent.toLowerCase();
        if (tabName === 'farm') {
          const plots = document.querySelectorAll('.plant-plot');
          gameState.plots.forEach((plot, idx) => {
            if (plots[idx] && plot.plant) {
              const progressBar = plots[idx].querySelector('.plant-progress-bar');
              if (progressBar) {
                progressBar.style.width = plot.progress + '%';
              }
            }
          });
          
          // Update employee positions
          renderEmployees();
        }
      }
    }

    // ===== INITIALIZATION =====
    function init() {
      addToInventory('wheat_seed', 1);
      
      updateInventory();
      updateMoney();
      initFarm();
      
      setInterval(gameLoop, 100);

      // Check every 10 seconds whether the 5CR winner flag is set,
      // and refresh the Upgrades tab if it's currently open
      setInterval(() => {
        const upgradesTab = document.getElementById('upgrades-tab');
        if (upgradesTab && upgradesTab.style.display !== 'none') {
          initUpgrades();
        }
      }, 10000);
    }

    init();
  </script>
</body>
